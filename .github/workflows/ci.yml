name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
          - os: ubuntu-latest
            node-version: 24
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Verify workflow action pins
        run: npm run verify:workflows
      - name: Verify upstream compatibility range
        run: npm run verify:compatibility
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
