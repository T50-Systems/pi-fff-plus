name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
          - os: ubuntu-latest
            node-version: 24
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Verify workflow action pins
        run: npm run verify:workflows
      - name: Verify upstream compatibility range
        run: npm run verify:compatibility
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
