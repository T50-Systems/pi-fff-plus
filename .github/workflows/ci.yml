name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
          - os: ubuntu-latest
            node-version: 24
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Verify upstream compatibility range
        run: npm run verify:compatibility
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
