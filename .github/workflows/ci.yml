name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Verify upstream compatibility range
        run: npm run verify:compatibility
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
